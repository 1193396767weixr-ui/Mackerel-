                    localStorage.setItem('englishRecords', JSON.stringify(data.value));
                };
                
                const loadData = () => {
                    const saved = localStorage.getItem('englishRecords');
                    if (saved) {
                        data.value = JSON.parse(saved);
                    }
                };
                
                onMounted(async () => {
                    loadData();
                    checkInstallPrompt();
                    
                    const token = localStorage.getItem('access_token');
                    const skipLogin = localStorage.getItem('skip_login');
                    
                    if (token) {
                        try {
                            await loadCloudData();
                        } catch (e) {
                            console.error('Failed to load cloud data:', e);
                        }
                    } else if (!skipLogin) {
                        isLoggedIn.value = false;
                    }
                    
                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        deferredPrompt = e;
                    });
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('recite') === 'true') {
                        currentPage.value = 'recite';
                    }
                });
                
                return {
                    currentPage,
                    currentType,
                    inputContent,
                    inputTranslation,
                    isLoading,
                    detectedTranslation,
                    searchQuery,
                    filterType,
                    reciteFilter,
                    showModal,
                    modalContent,
                    toastMessage,
                    showInstallPrompt,
                    installPromptVisible,
                    data,
                    todayDate,
                    stats,
                    todayItems,
                    hasTodayItems,
                    filteredTimeline,
                    reciteItems,
                    getPlaceholder,
                    getTranslationPlaceholder,
                    detectType,
                    getPosChinese,
                    getPosClass,
                    getTypeLabel,
                    onInputChange,
                    addRecord,
                    deleteItem,
                    deleteItemByDate,
                    showDetail,
                    toggleChinese,
                    showAllChinese,
                    hideAllChinese,
                    installApp,
                    dismissInstall,
                    isLoggedIn,
                    authMode,
                    authLoading,
                    authError,
                    loginForm,
                    registerForm,
                    currentUser,
                    cloudStats,
                    syncStatus,
                    syncStatusClass,
                    handleLogin,
                    handleRegister,
                    skipLogin,
                    handleLogout,
                    showLoginAgain,
                    syncToCloud,
                    syncFromCloud,
                    exportData,
                    importData
                };
            }
        }).mount('#app');
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
